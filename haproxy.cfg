global
    maxconn 8192
    nbthread 1
    log stdout format raw local0 warning

defaults
    mode http
    timeout connect 2s
    timeout client 65s
    timeout server 65s
    option http-keep-alive
    http-reuse always
    default-server maxconn 4096

frontend fe
    bind *:9999
    default_backend be

backend be
    balance roundrobin
    server api1 unix@/sockets/api1.sock check inter 200ms fall 5 rise 1
    server api2 unix@/sockets/api2.sock check inter 200ms fall 5 rise 1
