services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1:
    image: rinha-2026-asm:latest
    platform: linux/amd64
    build: .
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    image: rinha-2026-asm:latest
    platform: linux/amd64
    build: .
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"
